<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTC Compixa - Learn with Excellence</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (To compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /** * CONFIGURATION 
         * Replace GAS_URL with your deployed Google Apps Script Web App URL.
         */
        const CONFIG = {
          GAS_URL: "https://script.google.com/macros/s/AKfycbz61W74fsEn2fhAMQmTEaCETswVpZIBUXQoAepYezFUwXFz_7LIk85vtsNRmrEPg5E/exec", // Ekhane apnar Apps Script URL ti paste korun
          instituteName: "UTC Compixa",
          tagline: "Learn with Excellence",
          address: "Bhangar, West Bengal, Pin- 743502",
          phone: "9647046334"
        };

        // --- Main App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [currentView, setCurrentView] = useState('home');

          useEffect(() => {
            const savedSession = localStorage.getItem('compixa_user');
            if (savedSession) {
              const parsed = JSON.parse(savedSession);
              setUser(parsed);
              setCurrentView(parsed.role === 'Admin' ? 'admin' : 'student');
            }
          }, []);

          const handleLoginSuccess = (userData) => {
            setUser(userData);
            localStorage.setItem('compixa_user', JSON.stringify(userData));
            setCurrentView(userData.role === 'Admin' ? 'admin' : 'student');
          };

          const handleLogout = () => {
            setUser(null);
            localStorage.removeItem('compixa_user');
            setCurrentView('home');
          };

          return (
            <div className="min-h-screen flex flex-col relative">
              {/* Header */}
              <header className="bg-indigo-600 text-white py-4 px-6 shadow-md flex justify-between items-center z-10 relative">
                <div 
                  className="flex items-center gap-3 cursor-pointer" 
                  onClick={() => setCurrentView(user ? (user.role === 'Admin' ? 'admin' : 'student') : 'home')}
                >
                  <div className="bg-white p-2 rounded-lg text-indigo-600 flex items-center justify-center w-10 h-10">
                    <i className="fa-solid fa-book-open text-xl"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight">{CONFIG.instituteName}</h1>
                    <p className="text-xs text-indigo-200">{CONFIG.tagline}</p>
                  </div>
                </div>

                {user ? (
                  <div className="flex items-center gap-4">
                    <span className="hidden md:inline text-sm font-medium">Hello, {user.name} ({user.role})</span>
                    <button 
                      onClick={handleLogout}
                      className="flex items-center gap-2 bg-indigo-800 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm transition-colors"
                    >
                      <i className="fa-solid fa-right-from-bracket"></i> <span className="hidden sm:inline">Logout</span>
                    </button>
                  </div>
                ) : (
                  <div className="flex gap-2">
                     <button 
                      onClick={() => setCurrentView('login')}
                      className="bg-white text-indigo-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-50 transition-colors shadow-sm"
                    >
                      Login
                    </button>
                  </div>
                )}
              </header>

              {/* Main Content */}
              <main className="flex-grow flex flex-col relative overflow-hidden">
                {currentView === 'home' && <HomeView setView={setCurrentView} />}
                {currentView === 'login' && <LoginView setView={setCurrentView} onLogin={handleLoginSuccess} />}
                {currentView === 'apply' && <ApplyView setView={setCurrentView} />}
                {currentView === 'admin' && user?.role === 'Admin' && <AdminPanel />}
                {currentView === 'student' && user?.role === 'Student' && <StudentPanel user={user} />}
              </main>

              {/* Footer */}
              <footer className="bg-slate-800 text-slate-400 py-6 px-6 text-center text-sm z-10 relative">
                <p className="font-semibold text-slate-300">{CONFIG.instituteName} - {CONFIG.tagline}</p>
                <p>{CONFIG.address} | Ph: {CONFIG.phone}</p>
                <p className="mt-2 text-xs opacity-60">Powered by Google Workspace | Built for Excellence</p>
              </footer>
            </div>
          );
        }

        // --- Views ---

        function HomeView({ setView }) {
          return (
            <div className="flex-grow flex flex-col items-center justify-center p-6 text-center bg-gradient-to-b from-indigo-50 to-white overflow-y-auto">
              <div className="bg-white p-4 rounded-2xl shadow-xl inline-flex items-center justify-center w-24 h-24 mb-8">
                <i className="fa-solid fa-book-open text-4xl text-indigo-600"></i>
              </div>
              <h2 className="text-4xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">
                Welcome to <span className="text-indigo-600">{CONFIG.instituteName}</span>
              </h2>
              <p className="text-lg md:text-xl text-slate-600 max-w-2xl mb-10">
                Empowering students with comprehensive tools, modern study materials, and seamless online learning experiences.
              </p>
              
              <div className="flex flex-col sm:flex-row gap-4">
                <button 
                  onClick={() => setView('apply')}
                  className="flex items-center justify-center gap-2 bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 hover:shadow-lg transition-all"
                >
                  <i className="fa-solid fa-file-circle-plus"></i> Apply for Admission
                </button>
                <button 
                  onClick={() => setView('login')}
                  className="flex items-center justify-center gap-2 bg-white text-slate-700 border border-slate-200 shadow-sm px-8 py-4 rounded-xl font-bold text-lg hover:bg-slate-50 transition-all"
                >
                  <i className="fa-solid fa-lock"></i> Portal Login
                </button>
              </div>
            </div>
          );
        }

        function LoginView({ setView, onLogin }) {
          const [id, setId] = useState('');
          const [password, setPassword] = useState('');
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');

          const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true); setError('');
            try {
              const res = await apiCall('login', { id, password });
              if (res.success) {
                onLogin(res.data);
              } else {
                setError(res.error || "Login failed");
              }
            } catch (err) {
              setError("Network error. Please try again.");
            }
            setLoading(false);
          };

          return (
            <div className="flex-grow flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
                <div className="text-center mb-8">
                  <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i className="fa-solid fa-lock text-indigo-600 text-2xl"></i>
                  </div>
                  <h2 className="text-2xl font-bold">Account Login</h2>
                  <p className="text-slate-500 text-sm mt-1">Students & Admin secure access</p>
                </div>

                {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-100">{error}</div>}

                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">User ID</label>
                    <input 
                      type="text" required 
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                      placeholder="e.g., ADMIN1 or STU1234"
                      value={id} onChange={e => setId(e.target.value)}
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input 
                      type="password" required 
                      className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                      placeholder="••••••••"
                      value={password} onChange={e => setPassword(e.target.value)}
                    />
                  </div>
                  <button 
                    disabled={loading}
                    className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-colors disabled:opacity-70 mt-2 flex justify-center items-center h-12"
                  >
                    {loading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : 'Secure Login'}
                  </button>
                </form>

                <div className="mt-6 text-center text-sm text-slate-500">
                  Not enrolled yet? <button onClick={() => setView('apply')} className="text-indigo-600 font-semibold hover:underline">Apply Now</button>
                </div>
              </div>
            </div>
          );
        }

        function ApplyView({ setView }) {
          const [formData, setFormData] = useState({ name: '', className: '', phone: '' });
          const [status, setStatus] = useState(null);

          const handleSubmit = async (e) => {
            e.preventDefault();
            setStatus('loading');
            try {
              const res = await apiCall('applyAdmission', formData);
              if (res.success) setStatus('success');
              else setStatus('error');
            } catch (err) {
              setStatus('error');
            }
          };

          if (status === 'success') {
            return (
              <div className="flex-grow flex items-center justify-center p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
                  <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500">
                    <i className="fa-solid fa-circle-check text-4xl"></i>
                  </div>
                  <h2 className="text-2xl font-bold mb-2">Application Received!</h2>
                  <p className="text-slate-600 mb-6">Your admission request is pending admin approval. You will receive an SMS/Call soon.</p>
                  <button onClick={() => setView('home')} className="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-3 px-6 rounded-xl w-full transition-colors">
                    Return to Home
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="flex-grow flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold">Apply for Admission</h2>
                  <button onClick={() => setView('home')} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark"></i></button>
                </div>

                {status === 'error' && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4">Submission failed. Try again.</div>}

                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input required type="text" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500"
                      onChange={e => setFormData({...formData, name: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Applying for Class/Course</label>
                    <input required type="text" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500"
                      onChange={e => setFormData({...formData, className: e.target.value})} />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
                    <input required type="tel" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500"
                      onChange={e => setFormData({...formData, phone: e.target.value})} />
                  </div>
                  
                  <button disabled={status === 'loading'} className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 mt-4 flex justify-center items-center h-12">
                    {status === 'loading' ? <i className="fa-solid fa-circle-notch fa-spin"></i> : 'Submit Application'}
                  </button>
                </form>
              </div>
            </div>
          );
        }

        // --- Admin Panel ---
        function AdminPanel() {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          const tabs = [
            { id: 'dashboard', icon: 'fa-border-all', label: 'Dashboard' },
            { id: 'students', icon: 'fa-users', label: 'Students' },
            { id: 'admissions', icon: 'fa-file-circle-plus', label: 'Admissions' },
            { id: 'test', icon: 'fa-circle-play', label: 'Online Tests' },
            { id: 'materials', icon: 'fa-file-lines', label: 'Study Materials' },
          ];

          return (
            <div className="flex flex-col md:flex-row flex-grow h-full bg-slate-100 overflow-hidden absolute inset-0">
              {/* Sidebar */}
              <div className="w-full md:w-64 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0">
                <div className="p-4">
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 px-2">Admin Menu</p>
                  <nav className="space-y-1">
                    {tabs.map(tab => (
                      <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 shadow-sm' : 'text-slate-600 hover:bg-slate-50'}`}
                      >
                        <i className={`fa-solid ${tab.icon} w-5 text-center ${activeTab === tab.id ? 'text-indigo-600' : 'text-slate-400'}`}></i>
                        {tab.label}
                      </button>
                    ))}
                  </nav>
                </div>
              </div>

              {/* Main Content */}
              <div className="flex-grow overflow-y-auto p-6">
                {activeTab === 'dashboard' && <AdminDashboard />}
                {activeTab === 'students' && <AdminStudents />}
                {activeTab === 'admissions' && <AdminAdmissions />}
                {activeTab === 'test' && <AdminTests />}
                {activeTab === 'materials' && <AdminMaterials />}
              </div>
            </div>
          );
        }

        function AdminDashboard() {
          const [stats, setStats] = useState({ students: 0, pendingAdmissions: 0 });
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            apiCall('getDashboardStats', {}).then(res => {
              if(res.success) setStats(res.data);
              setLoading(false);
            });
          }, []);

          return (
            <div className="max-w-4xl">
              <h2 className="text-2xl font-bold mb-6 text-slate-800">Dashboard Overview</h2>
              {loading ? <p className="text-slate-500">Loading stats...</p> : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div className="bg-indigo-100 p-4 rounded-xl text-indigo-600"><i className="fa-solid fa-users text-2xl"></i></div>
                    <div>
                      <p className="text-slate-500 text-sm font-medium">Active Students</p>
                      <p className="text-3xl font-bold text-slate-800">{stats.students}</p>
                    </div>
                  </div>
                  <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div className="bg-orange-100 p-4 rounded-xl text-orange-600"><i className="fa-solid fa-file-circle-plus text-2xl"></i></div>
                    <div>
                      <p className="text-slate-500 text-sm font-medium">Pending Admissions</p>
                      <p className="text-3xl font-bold text-slate-800">{stats.pendingAdmissions}</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function AdminStudents() {
          const [students, setStudents] = useState([]);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            apiCall('getUsers', {}).then(res => {
              if(res.success) {
                setStudents(res.data.filter(u => u.Role === 'Student' && u.Approved === 'Yes'));
              }
              setLoading(false);
            });
          }, []);

          return (
            <div>
              <h2 className="text-2xl font-bold mb-6 text-slate-800">Enrolled Students</h2>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                {loading ? <div className="p-8 text-center text-slate-500">Loading...</div> : (
                  <table className="min-w-full divide-y divide-slate-200">
                    <thead className="bg-slate-50">
                      <tr>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Student ID</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Name</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Status</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      {students.map((s, i) => (
                        <tr key={i} className="hover:bg-slate-50">
                          <td className="px-6 py-4 text-sm font-medium text-slate-900">{s.ID}</td>
                          <td className="px-6 py-4 text-sm text-slate-700">{s.Name}</td>
                          <td className="px-6 py-4 text-sm"><span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-medium">Active</span></td>
                        </tr>
                      ))}
                      {students.length === 0 && <tr><td colSpan="3" className="p-6 text-center text-slate-500">No students found.</td></tr>}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          );
        }

        function AdminAdmissions() {
          const [admissions, setAdmissions] = useState([]);
          const [loading, setLoading] = useState(true);

          const fetchAds = () => {
            setLoading(true);
            apiCall('getAdmissions', {}).then(res => {
              if(res.success) setAdmissions(res.data.filter(a => a.Status === 'Pending'));
              setLoading(false);
            });
          };

          useEffect(() => { fetchAds(); }, []);

          const handleApprove = async (rowId, name) => {
            const res = await apiCall('approveAdmission', { rowId, name });
            if(res.success) {
              alert(res.data.message);
              fetchAds();
            }
          };

          return (
            <div>
              <h2 className="text-2xl font-bold mb-6 text-slate-800">Pending Admissions</h2>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
                {loading ? <div className="p-8 text-center text-slate-500">Loading...</div> : (
                  <table className="min-w-full divide-y divide-slate-200">
                    <thead className="bg-slate-50">
                      <tr>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Name</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Class</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Phone</th>
                        <th className="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase">Action</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      {admissions.map((a, i) => (
                        <tr key={i}>
                          <td className="px-6 py-4 text-sm font-medium text-slate-900">{a.Name}</td>
                          <td className="px-6 py-4 text-sm text-slate-700">{a.Class}</td>
                          <td className="px-6 py-4 text-sm text-slate-700">{a.Phone}</td>
                          <td className="px-6 py-4 text-sm">
                            <button onClick={() => handleApprove(a._rowIndex, a.Name)} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-indigo-700 transition-colors">
                              Approve & Create ID
                            </button>
                          </td>
                        </tr>
                      ))}
                      {admissions.length === 0 && <tr><td colSpan="4" className="p-6 text-center text-slate-500">No pending admissions.</td></tr>}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          );
        }

        function AdminTests() {
          const [questions, setQuestions] = useState([]);
          const [loading, setLoading] = useState(true);
          const [form, setForm] = useState({question: '', optA: '', optB: '', optC: '', optD: '', correct: 'A'});

          const fetchQs = () => {
            setLoading(true);
            apiCall('getQuestions', {}).then(res => {
              if(res.success) setQuestions(res.data);
              setLoading(false);
            });
          };

          useEffect(() => { fetchQs(); }, []);

          const handleAdd = async (e) => {
            e.preventDefault();
            await apiCall('addQuestion', form);
            setForm({question: '', optA: '', optB: '', optC: '', optD: '', correct: 'A'});
            fetchQs();
          };

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div>
                <h2 className="text-xl font-bold mb-4 text-slate-800">Add New Question</h2>
                <form onSubmit={handleAdd} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                  <textarea required placeholder="Question text..." className="w-full p-3 rounded-xl border border-slate-200" rows="3" value={form.question} onChange={e=>setForm({...form, question: e.target.value})}></textarea>
                  <input required placeholder="Option A" className="w-full p-3 rounded-xl border border-slate-200" value={form.optA} onChange={e=>setForm({...form, optA: e.target.value})} />
                  <input required placeholder="Option B" className="w-full p-3 rounded-xl border border-slate-200" value={form.optB} onChange={e=>setForm({...form, optB: e.target.value})} />
                  <input required placeholder="Option C" className="w-full p-3 rounded-xl border border-slate-200" value={form.optC} onChange={e=>setForm({...form, optC: e.target.value})} />
                  <input required placeholder="Option D" className="w-full p-3 rounded-xl border border-slate-200" value={form.optD} onChange={e=>setForm({...form, optD: e.target.value})} />
                  <div>
                    <label className="block text-sm mb-1 text-slate-600">Correct Option</label>
                    <select className="w-full p-3 rounded-xl border border-slate-200" value={form.correct} onChange={e=>setForm({...form, correct: e.target.value})}>
                      <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
                    </select>
                  </div>
                  <button className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">Save Question</button>
                </form>
              </div>
              <div>
                <h2 className="text-xl font-bold mb-4 text-slate-800">Question Bank</h2>
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden overflow-y-auto max-h-[500px]">
                  {loading ? <div className="p-4">Loading...</div> : questions.map((q, i) => (
                    <div key={i} className="p-4 border-b border-slate-100 hover:bg-slate-50">
                      <p className="font-medium text-sm text-slate-800 mb-2">Q{i+1}: {q.Question}</p>
                      <div className="grid grid-cols-2 gap-2 text-xs text-slate-600">
                        <span className={q['Correct Answer'] === 'A' ? 'text-green-600 font-bold' : ''}>A: {q['Option A']}</span>
                        <span className={q['Correct Answer'] === 'B' ? 'text-green-600 font-bold' : ''}>B: {q['Option B']}</span>
                        <span className={q['Correct Answer'] === 'C' ? 'text-green-600 font-bold' : ''}>C: {q['Option C']}</span>
                        <span className={q['Correct Answer'] === 'D' ? 'text-green-600 font-bold' : ''}>D: {q['Option D']}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        function AdminMaterials() {
          const [materials, setMaterials] = useState([]);
          const [form, setForm] = useState({title: '', driveLink: '', targetClass: ''});

          const fetchMats = () => {
            apiCall('getMaterials', {}).then(res => {
              if(res.success) setMaterials(res.data);
            });
          };
          useEffect(() => { fetchMats(); }, []);

          const handleAdd = async (e) => {
            e.preventDefault();
            await apiCall('addMaterial', form);
            setForm({title: '', driveLink: '', targetClass: ''});
            fetchMats();
          };

          return (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div>
                <h2 className="text-xl font-bold mb-4">Add Study Material</h2>
                <form onSubmit={handleAdd} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                   <input required placeholder="Material Title" className="w-full p-3 rounded-xl border border-slate-200" value={form.title} onChange={e=>setForm({...form, title: e.target.value})} />
                   <input required placeholder="Target Class / Course" className="w-full p-3 rounded-xl border border-slate-200" value={form.targetClass} onChange={e=>setForm({...form, targetClass: e.target.value})} />
                   <input required placeholder="Google Drive View Link" className="w-full p-3 rounded-xl border border-slate-200" value={form.driveLink} onChange={e=>setForm({...form, driveLink: e.target.value})} />
                   <button className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">Publish Link</button>
                </form>
              </div>
              <div>
                <h2 className="text-xl font-bold mb-4">Published Materials</h2>
                 <div className="space-y-3">
                  {materials.map((m, i) => (
                    <div key={i} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                      <div>
                        <h3 className="font-bold text-slate-800">{m.Title}</h3>
                        <span className="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded">Class: {m.Class}</span>
                      </div>
                      <a href={m.DriveLink} target="_blank" rel="noreferrer" className="text-indigo-600 hover:bg-indigo-50 p-2 rounded-lg"><i className="fa-solid fa-download"></i></a>
                    </div>
                  ))}
                 </div>
              </div>
            </div>
          );
        }

        // --- Student Panel ---
        function StudentPanel({ user }) {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          const tabs = [
            { id: 'dashboard', icon: 'fa-border-all', label: 'My Dashboard' },
            { id: 'test', icon: 'fa-circle-play', label: 'Take Online Test' },
            { id: 'materials', icon: 'fa-download', label: 'Study Materials' },
          ];

          return (
            <div className="flex flex-col md:flex-row flex-grow h-full bg-slate-50 overflow-hidden absolute inset-0">
              {/* Sidebar */}
              <div className="w-full md:w-64 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0">
                <div className="p-4">
                   <div className="bg-indigo-50 rounded-xl p-4 mb-6 border border-indigo-100">
                     <div className="w-12 h-12 bg-indigo-200 rounded-full flex items-center justify-center text-indigo-700 font-bold text-lg mb-2">
                       {user.name.charAt(0)}
                     </div>
                     <p className="font-bold text-slate-800">{user.name}</p>
                     <p className="text-xs text-slate-500">ID: {user.id}</p>
                   </div>
                  <nav className="space-y-1">
                    {tabs.map(tab => (
                      <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'}`}
                      >
                        <i className={`fa-solid ${tab.icon} w-5 text-center`}></i>
                        {tab.label}
                      </button>
                    ))}
                  </nav>
                </div>
              </div>

              {/* Main Content */}
              <div className="flex-grow overflow-y-auto p-6 bg-slate-50">
                {activeTab === 'dashboard' && (
                  <div className="max-w-4xl">
                     <h2 className="text-2xl font-bold mb-6 text-slate-800">Welcome back, {user.name.split(' ')[0]}!</h2>
                     <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl p-6 text-white shadow-lg">
                          <h3 className="font-bold text-lg mb-2">Quick Tip</h3>
                          <p className="text-indigo-100 text-sm">New study materials have been uploaded for your batch. Check them out to stay ahead!</p>
                          <button onClick={()=>setActiveTab('materials')} className="mt-4 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm transition-colors">View Materials</button>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                          <h3 className="font-bold text-lg mb-2 text-slate-800">Upcoming Test</h3>
                          <p className="text-slate-500 text-sm mb-4">Practice your skills with our automated MCQ tests.</p>
                          <button onClick={()=>setActiveTab('test')} className="text-indigo-600 font-semibold text-sm flex items-center gap-1 hover:underline">
                            Start Practice <i className="fa-solid fa-chevron-right text-xs"></i>
                          </button>
                        </div>
                     </div>
                  </div>
                )}
                {activeTab === 'test' && <StudentTest />}
                {activeTab === 'materials' && <StudentMaterials />}
              </div>
            </div>
          );
        }

        function StudentTest() {
          const [questions, setQuestions] = useState([]);
          const [currentQ, setCurrentQ] = useState(0);
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);
          const [score, setScore] = useState(0);

          useEffect(() => {
            apiCall('getQuestions', {}).then(res => {
              if(res.success && res.data.length > 0) setQuestions(res.data);
            });
          }, []);

          const handleSelect = (opt) => {
            setAnswers({...answers, [currentQ]: opt});
          };

          const handleNext = () => {
            if (currentQ < questions.length - 1) setCurrentQ(currentQ + 1);
          };

          const handleSubmit = () => {
            let s = 0;
            questions.forEach((q, i) => {
              if(answers[i] === q['Correct Answer']) s++;
            });
            setScore(s);
            setSubmitted(true);
          };

          if (questions.length === 0) return <div className="p-8 text-center text-slate-500 bg-white rounded-2xl border border-slate-200">No tests available right now.</div>;

          if (submitted) {
            return (
              <div className="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center">
                <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                   <span className="text-3xl font-bold text-green-600">{score}/{questions.length}</span>
                </div>
                <h2 className="text-2xl font-bold mb-2">Test Completed!</h2>
                <p className="text-slate-600 mb-6">Your responses have been recorded automatically.</p>
                <button onClick={() => {setSubmitted(false); setCurrentQ(0); setAnswers({});}} className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-medium">Retake Test</button>
              </div>
            );
          }

          const q = questions[currentQ];

          return (
            <div className="max-w-3xl mx-auto">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-bold text-slate-800">Online Practice Test</h2>
                <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-semibold">Question {currentQ + 1} of {questions.length}</span>
              </div>
              
              <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h3 className="text-lg font-medium text-slate-800 mb-6">{currentQ + 1}. {q.Question}</h3>
                
                <div className="space-y-3">
                  {['A', 'B', 'C', 'D'].map(opt => (
                    <button 
                      key={opt}
                      onClick={() => handleSelect(opt)}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all flex justify-between items-center ${answers[currentQ] === opt ? 'border-indigo-600 bg-indigo-50' : 'border-slate-100 hover:border-slate-300'}`}
                    >
                      <span><span className="font-bold mr-2 text-slate-400">{opt}.</span> {q[`Option ${opt}`]}</span>
                      {answers[currentQ] === opt && <i className="fa-solid fa-circle-check text-indigo-600 text-xl"></i>}
                    </button>
                  ))}
                </div>

                <div className="mt-8 flex justify-end">
                  {currentQ < questions.length - 1 ? (
                    <button 
                      onClick={handleNext} disabled={!answers[currentQ]}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50"
                    >
                      Next Question
                    </button>
                  ) : (
                    <button 
                      onClick={handleSubmit} disabled={!answers[currentQ]}
                      className="bg-green-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50"
                    >
                      Submit Test
                    </button>
                  )}
                </div>
              </div>
            </div>
          );
        }

        function StudentMaterials() {
          const [materials, setMaterials] = useState([]);
          
          useEffect(() => {
            apiCall('getMaterials', {}).then(res => {
              if(res.success) setMaterials(res.data);
            });
          }, []);

          return (
            <div className="max-w-4xl">
              <h2 className="text-2xl font-bold mb-6 text-slate-800">Study Materials</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {materials.length === 0 ? <p className="text-slate-500 col-span-3">No materials uploaded yet.</p> : null}
                {materials.map((m, i) => (
                  <div key={i} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow group">
                    <div className="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 mb-4 group-hover:scale-110 transition-transform">
                      <i className="fa-solid fa-file-lines text-2xl"></i>
                    </div>
                    <h3 className="font-bold text-slate-800 mb-1">{m.Title}</h3>
                    <p className="text-xs text-slate-500 mb-4">Class: {m.Class}</p>
                    <a href={m.DriveLink} target="_blank" rel="noreferrer" className="block w-full text-center bg-slate-50 hover:bg-indigo-50 text-indigo-600 font-medium py-2 rounded-lg transition-colors border border-slate-100">
                      Open Material
                    </a>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        // --- API Service ---
        async function apiCall(action, payload) {
          if (CONFIG.GAS_URL && CONFIG.GAS_URL.startsWith('http')) {
            try {
              const res = await fetch(CONFIG.GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action, payload })
              });
              return await res.json();
            } catch (error) {
              console.error("API Error:", error);
              return { success: false, error: "Server connection failed." };
            }
          } else {
            // Mock mode if no URL is provided
            return new Promise(resolve => {
              setTimeout(() => {
                resolve(mockBackend(action, payload));
              }, 600);
            });
          }
        }

        // Mock DB for offline testing
        const MOCK_DB = {
          users: [
            { ID: 'ADMIN1', Name: 'Super Admin', Password: 'admin', Role: 'Admin', Approved: 'Yes' },
            { ID: 'STU1001', Name: 'John Doe', Password: 'password123', Role: 'Student', Approved: 'Yes' },
          ],
          admissions: [
            { _rowIndex: 0, Name: 'Alice Smith', Class: 'Class 10', Phone: '9876543210', Status: 'Pending' }
          ],
          questions: [
            { Question: 'What does HTML stand for?', 'Option A': 'Hyper Text Markup Language', 'Option B': 'Hot Mail', 'Option C': 'How to Make Lasagna', 'Option D': 'None', 'Correct Answer': 'A' }
          ],
          materials: [
            { Title: 'Chapter 1: Web Basics', Class: 'Class 10', DriveLink: '#' }
          ]
        };

        function mockBackend(action, payload) {
          switch(action) {
            case 'login':
              const user = MOCK_DB.users.find(u => u.ID === payload.id && u.Password === payload.password);
              if (user) return { success: true, data: { id: user.ID, name: user.Name, role: user.Role } };
              return { success: false, error: "Invalid credentials (Use ADMIN1/admin)" };
            case 'applyAdmission': return { success: true, data: { message: "Success" } };
            case 'getDashboardStats': return { success: true, data: { students: 1, pendingAdmissions: 1 }};
            case 'getUsers': return { success: true, data: MOCK_DB.users };
            case 'getAdmissions': return { success: true, data: MOCK_DB.admissions };
            case 'getQuestions': return { success: true, data: MOCK_DB.questions };
            case 'addQuestion': return { success: true, data: {} };
            case 'getMaterials': return { success: true, data: MOCK_DB.materials };
            case 'addMaterial': return { success: true, data: {} };
            default: return { success: false, error: "Mock action not found" };
          }
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
